version: "3.9"

services:
  # ── Backend service ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: garabadge-backend
    restart: unless-stopped
    environment:
      PORT: 3001
      CORS_ORIGIN: "*"
    ports:
      - "3001:3001"
    networks:
      - garabadge

  # ── Kong API Gateway (DB-less) ─────────────────────────────────────────────
  kong:
    image: kong:3.7
    container_name: garabadge-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000:8000"   # proxy (frontend calls this)
      - "8001:8001"   # admin API
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    depends_on:
      - backend
    networks:
      - garabadge
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10

networks:
  garabadge:
    driver: bridge