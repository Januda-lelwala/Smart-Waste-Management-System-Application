version: "3.9"

services:
  # ── Next.js app (UI + API routes) ─────────────────────────────────────────
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: garabadge-nextjs
    restart: unless-stopped
    environment:
      NODE_ENV: production
    expose:
      - "3000"
    networks:
      - garabadge

  # ── Kong API Gateway (DB-less) ─────────────────────────────────────────────
  kong:
    image: kong:3.7
    container_name: garabadge-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000:8000"   # public proxy
      - "8001:8001"   # admin API (restrict in production)
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    depends_on:
      - nextjs
    networks:
      - garabadge
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10

networks:
  garabadge:
    driver: bridge