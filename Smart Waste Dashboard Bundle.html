<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SmartWaste — Operations Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; width: 100%; overflow: hidden; }
  body {
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    background: #080D18;
    color: #E4EBF5;
    -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #1E2B3F; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #2A3B55; }
  button { font-family: inherit; }
  select { font-family: inherit; }
  input { font-family: inherit; }
  input::placeholder { color: #4D5F75; }

  /* Leaflet overrides — dark theme */
  .leaflet-container { background: #080D18; font-family: 'IBM Plex Sans', sans-serif; }
  .leaflet-control-zoom { border: 1px solid #1E2B3F !important; border-radius: 8px !important; overflow: hidden; }
  .leaflet-control-zoom a { background: #0F1624 !important; color: #8494A8 !important; border-color: #1E2B3F !important; }
  .leaflet-control-zoom a:hover { background: #192236 !important; color: #E4EBF5 !important; }
  .leaflet-control-attribution { background: #0C142099 !important; color: #4D5F75 !important; font-size: 9px !important; padding: 2px 6px !important; border-radius: 4px 0 0 0 !important; }
  .leaflet-control-attribution a { color: #4D5F75 !important; }
  .leaflet-popup-content-wrapper { background: #0F1624 !important; border: 1px solid #1E2B3F !important; border-radius: 10px !important; box-shadow: 0 8px 32px #00000099 !important; color: #E4EBF5 !important; }
  .leaflet-popup-tip { background: #0F1624 !important; }
  .leaflet-popup-close-button { color: #4D5F75 !important; }
  @keyframes ring {
    0%   { transform: scale(1); opacity: 0.4; }
    70%  { transform: scale(2.4); opacity: 0; }
    100% { transform: scale(2.4); opacity: 0; }
  }

  /* Tweaks panel */
  #tweaks-panel {
    display: none;
    position: fixed;
    bottom: 24px; right: 24px;
    background: #0F1624;
    border: 1px solid #1E2B3F;
    border-radius: 12px;
    padding: 18px 20px;
    width: 240px;
    z-index: 9999;
    box-shadow: 0 16px 48px #00000099;
  }
  #tweaks-panel.visible { display: block; }
  .tweak-label { color: #8494A8; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; margin-bottom: 6px; display: block; }
  .tweak-row { margin-bottom: 14px; }
  .tweak-select { width: 100%; background: #131D30; border: 1px solid #1E2B3F; border-radius: 6px;
    color: #E4EBF5; padding: 7px 10px; font-size: 12px; font-family: inherit; outline: none; cursor: pointer; }
  .tweak-toggle { display: flex; gap: 0; border: 1px solid #1E2B3F; border-radius: 6px; overflow: hidden; }
  .tweak-toggle button { flex: 1; background: transparent; border: none; color: #8494A8;
    padding: 6px; font-size: 11px; cursor: pointer; transition: all 0.15s; }
  .tweak-toggle button.active { background: #22D3C5; color: #080D18; font-weight: 700; }
</style>
</head>
<body>
<div id="root"></div>
<script src="sw_data.js"></script>
<script type="text/babel" src="sw_views.jsx"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#22D3C5",
  "density": "comfortable",
  "animatePulse": true
}/*EDITMODE-END*/;

const NAV_ITEMS = [
  { id:'map',      icon: MapIcon,      label:'Live Map'   },
  { id:'bins',     icon: BinsIcon,     label:'Bins'       },
  { id:'route',    icon: RouteIcon,    label:'Routes'     },
  { id:'alerts',   icon: AlertsIcon,   label:'Alerts'     },
  { id:'analytics',icon: AnalyticsIcon,label:'Analytics'  },
];

// ── SVG Icons ────────────────────────────────────────────────────────────────

function MapIcon({ size=18, color }) {
  return <svg width={size} height={size} viewBox="0 0 20 20" fill="none">
    <path d="M10 2C7.24 2 5 4.24 5 7c0 4.25 5 11 5 11s5-6.75 5-11c0-2.76-2.24-5-5-5z"
      stroke={color} strokeWidth="1.5" fill={color} fillOpacity="0.15"/>
    <circle cx="10" cy="7" r="2" stroke={color} strokeWidth="1.5"/>
  </svg>;
}
function BinsIcon({ size=18, color }) {
  return <svg width={size} height={size} viewBox="0 0 20 20" fill="none">
    <rect x="4" y="7" width="12" height="10" rx="1.5" stroke={color} strokeWidth="1.5"/>
    <path d="M3 7h14M8 7V5a1 1 0 011-1h2a1 1 0 011 1v2" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
    <line x1="8" y1="11" x2="8" y2="14" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
    <line x1="12" y1="11" x2="12" y2="14" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
  </svg>;
}
function RouteIcon({ size=18, color }) {
  return <svg width={size} height={18} viewBox="0 0 20 20" fill="none">
    <circle cx="4" cy="5" r="2" stroke={color} strokeWidth="1.5"/>
    <circle cx="16" cy="15" r="2" stroke={color} strokeWidth="1.5"/>
    <circle cx="16" cy="5" r="2" stroke={color} strokeWidth="1.5"/>
    <path d="M6 5h4.5A1.5 1.5 0 0112 6.5v7A1.5 1.5 0 0013.5 15" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
  </svg>;
}
function AlertsIcon({ size=18, color }) {
  return <svg width={size} height={size} viewBox="0 0 20 20" fill="none">
    <path d="M10 2L3 16h14L10 2z" stroke={color} strokeWidth="1.5" strokeLinejoin="round" fill={color} fillOpacity="0.1"/>
    <line x1="10" y1="8" x2="10" y2="12" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
    <circle cx="10" cy="14.5" r="0.75" fill={color}/>
  </svg>;
}
function AnalyticsIcon({ size=18, color }) {
  return <svg width={size} height={size} viewBox="0 0 20 20" fill="none">
    <rect x="3" y="13" width="3" height="4" rx="0.5" fill={color} opacity="0.8"/>
    <rect x="8.5" y="9" width="3" height="8" rx="0.5" fill={color} opacity="0.8"/>
    <rect x="14" y="5" width="3" height="12" rx="0.5" fill={color} opacity="0.8"/>
    <path d="M4.5 13l6-8 5 4" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
  </svg>;
}

// ── Status Dot ────────────────────────────────────────────────────────────────

function PulseDot({ color='#34D399' }) {
  return (
    <span style={{ position:'relative', display:'inline-flex', width:10, height:10 }}>
      <span style={{ position:'absolute', inset:0, borderRadius:'50%', background:color, opacity:0.4,
        animation:'ping 1.8s cubic-bezier(0,0,0.2,1) infinite' }}/>
      <span style={{ position:'relative', borderRadius:'50%', background:color, width:10, height:10,
        display:'inline-block', boxShadow:`0 0 6px ${color}` }}/>
      <style>{`@keyframes ping { 0%{transform:scale(1);opacity:0.4} 75%,100%{transform:scale(2.2);opacity:0} }`}</style>
    </span>
  );
}

// ── Top Bar ───────────────────────────────────────────────────────────────────

function TopBar({ bins, alerts }) {
  const [time, setTime] = useState(new Date());
  useEffect(() => {
    const t = setInterval(() => setTime(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  const critical = bins.filter(b => b.status==='critical').length;
  const offline  = bins.filter(b => b.offline).length;
  const unread   = alerts.filter(a => !a.read).length;

  return (
    <div style={{ height:56, background:'#0C1420', borderBottom:'1px solid #1E2B3F',
      display:'flex', alignItems:'center', padding:'0 20px', gap:20, flexShrink:0, zIndex:10 }}>
      {/* Logo */}
      <div style={{ display:'flex', alignItems:'center', gap:10, marginRight:8 }}>
        <div style={{ width:28, height:28, borderRadius:7, background:'linear-gradient(135deg,#22D3C5,#0F766E)',
          display:'flex', alignItems:'center', justifyContent:'center', fontSize:14 }}>
          ♻
        </div>
        <div>
          <div style={{ color:'#E4EBF5', fontSize:13, fontWeight:700, lineHeight:1.2 }}>SmartWaste</div>
          <div style={{ color:'#4D5F75', fontSize:9, letterSpacing:'0.1em' }}>OPERATIONS</div>
        </div>
      </div>

      {/* System status chips */}
      <div style={{ display:'flex', gap:10, flex:1 }}>
        <StatusChip icon={<PulseDot color="#34D399"/>} label="System" value="Online" color="#34D399"/>
        <StatusChip label="Bins Active" value={`${bins.length - offline} / ${bins.length}`} color="#60A5FA"/>
        {critical > 0 && <StatusChip label="Critical" value={critical} color="#F87171"/>}
        {unread > 0 && <StatusChip label="Alerts" value={unread} color="#FBBF24"/>}
      </div>

      {/* Time + user */}
      <div style={{ display:'flex', alignItems:'center', gap:16 }}>
        <div style={{ fontFamily:"'IBM Plex Mono',monospace", color:'#4D5F75', fontSize:12 }}>
          {time.toLocaleTimeString('en-GB')}
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <div style={{ width:28, height:28, borderRadius:'50%', background:'#192236',
            border:'1px solid #1E2B3F', display:'flex', alignItems:'center', justifyContent:'center',
            color:'#8494A8', fontSize:12, fontWeight:600 }}>
            OP
          </div>
          <div>
            <div style={{ color:'#E4EBF5', fontSize:12, fontWeight:600, lineHeight:1.2 }}>Operator</div>
            <div style={{ color:'#4D5F75', fontSize:9 }}>Admin</div>
          </div>
        </div>
      </div>
    </div>
  );
}

function StatusChip({ icon, label, value, color }) {
  return (
    <div style={{ background:'#131D30', border:'1px solid #1E2B3F', borderRadius:6,
      padding:'4px 10px', display:'flex', alignItems:'center', gap:6 }}>
      {icon}
      <span style={{ color:'#4D5F75', fontSize:10 }}>{label}</span>
      <span style={{ color, fontSize:11, fontWeight:700 }}>{value}</span>
    </div>
  );
}

// ── Sidebar ───────────────────────────────────────────────────────────────────

function Sidebar({ active, onNav, alerts }) {
  const unreadAlerts = alerts.filter(a=>!a.read).length;
  return (
    <div style={{ width:58, background:'#0C1420', borderRight:'1px solid #1E2B3F',
      display:'flex', flexDirection:'column', alignItems:'center',
      padding:'12px 0', gap:4, flexShrink:0, zIndex:10 }}>
      {NAV_ITEMS.map(item => {
        const isActive = active === item.id;
        const hasAlert = item.id==='alerts' && unreadAlerts>0;
        const Icon = item.icon;
        return (
          <button key={item.id} onClick={() => onNav(item.id)} title={item.label}
            style={{ width:42, height:42, borderRadius:10, border:'none',
              background: isActive ? '#192236' : 'transparent',
              cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center',
              position:'relative', transition:'background 0.15s ease',
              outline: isActive ? '1px solid #1E2B3F' : 'none' }}>
            <Icon color={isActive ? '#22D3C5' : '#4D5F75'}/>
            {hasAlert && (
              <span style={{ position:'absolute', top:4, right:4, width:8, height:8,
                background:'#F87171', borderRadius:'50%', border:'1.5px solid #0C1420' }}/>
            )}
            {isActive && (
              <span style={{ position:'absolute', left:0, top:'50%', transform:'translateY(-50%)',
                width:3, height:22, background:'#22D3C5', borderRadius:'0 2px 2px 0' }}/>
            )}
          </button>
        );
      })}

      {/* Bottom: settings */}
      <div style={{ flex:1 }}/>
      <button style={{ width:42, height:42, borderRadius:10, border:'none',
        background:'transparent', cursor:'pointer', display:'flex', alignItems:'center',
        justifyContent:'center', color:'#4D5F75', fontSize:16 }} title="Settings">
        ⚙
      </button>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────

function App() {
  const { ZONES, ALERTS, ROUTE, ANALYTICS } = window.SW;
  const [view, setView] = useState(() => localStorage.getItem('sw_view') || 'map');
  const [bins, setBins] = useState(() => window.SW.BINS);
  const [alerts, setAlerts] = useState(ALERTS.map(a=>({...a, read:false})));
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const alertCounter = useRef(13);

  // Persist view
  useEffect(() => { localStorage.setItem('sw_view', view); }, [view]);

  // Live updates — simulate real-time sensor data
  useEffect(() => {
    const t = setInterval(() => {
      setBins(prev => prev.map(b => {
        if (b.offline) return b;
        const delta = (Math.random()-0.35)*3;
        const newFill = Math.max(0, Math.min(100, b.fill + delta));
        const newStatus = newFill>=85?'critical':newFill>=60?'warning':'ok';
        return { ...b, fill:Math.round(newFill), status:newStatus, lastPing:Date.now() };
      }));
    }, 4000);
    return () => clearInterval(t);
  }, []);

  // Periodic new alerts
  useEffect(() => {
    const msgs = [
      { sev:'warning', msg:'Fill level approaching 80% threshold' },
      { sev:'info',    msg:'Scheduled maintenance due tomorrow' },
      { sev:'critical',msg:'Fill level exceeded 90% — immediate pickup needed' },
      { sev:'warning', msg:'Battery below 20%' },
    ];
    const t = setInterval(() => {
      const m = msgs[Math.floor(Math.random()*msgs.length)];
      const randomBin = bins[Math.floor(Math.random()*bins.length)];
      alertCounter.current++;
      setAlerts(prev => [{
        id: `ALT-${String(alertCounter.current).padStart(3,'0')}`,
        sev: m.sev, binId: randomBin.id, msg: m.msg,
        ts: Date.now(), read: false,
      }, ...prev].slice(0, 30));
    }, 20000);
    return () => clearInterval(t);
  }, [bins]);

  // Tweaks messaging
  useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode')   setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  function applyTweak(key, val) {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits: next }, '*');
  }

  const viewTitles = {
    map: 'Live Map', bins: 'Bins Overview',
    route: 'Route Optimization', alerts: 'Alerts & Notifications', analytics: 'Analytics',
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh', overflow:'hidden' }}>
      <TopBar bins={bins} alerts={alerts}/>
      <div style={{ display:'flex', flex:1, overflow:'hidden' }}>
        <Sidebar active={view} onNav={setView} alerts={alerts}/>

        {/* Main content */}
        <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
          {/* Breadcrumb bar */}
          <div style={{ height:40, display:'flex', alignItems:'center', padding:'0 20px',
            borderBottom:'1px solid #1E2B3F', background:'#0C1420', flexShrink:0 }}>
            <span style={{ color:'#4D5F75', fontSize:11 }}>Dashboard</span>
            <span style={{ color:'#2A3B55', margin:'0 8px' }}>›</span>
            <span style={{ color:'#E4EBF5', fontSize:11, fontWeight:600 }}>{viewTitles[view]}</span>
            {view==='map' && (
              <span style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:6 }}>
                <PulseDot color="#34D399"/>
                <span style={{ color:'#4D5F75', fontSize:10 }}>Live feed</span>
              </span>
            )}
          </div>

          {/* Content area */}
          <div style={{ flex:1, overflow:'auto', padding:16 }}>
            {view==='map'      && <div style={{height:'100%'}}><MapView bins={bins}/></div>}
            {view==='bins'     && <BinsView bins={bins}/>}
            {view==='route'    && <RouteView bins={bins} route={ROUTE}/>}
            {view==='alerts'   && <AlertsView alerts={alerts}/>}
            {view==='analytics'&& <AnalyticsView analytics={ANALYTICS} zones={ZONES}/>}
          </div>
        </div>
      </div>

      {/* Tweaks panel */}
      <div id="tweaks-panel" className={tweaksVisible ? 'visible' : ''}>
        <div style={{ color:'#E4EBF5', fontSize:12, fontWeight:700, marginBottom:14,
          borderBottom:'1px solid #1E2B3F', paddingBottom:10 }}>Tweaks</div>

        <div className="tweak-row">
          <label className="tweak-label">ACCENT COLOR</label>
          <div className="tweak-toggle">
            {[['#22D3C5','Teal'],['#34D399','Green'],['#60A5FA','Blue']].map(([c,l])=>(
              <button key={c} className={tweaks.accentColor===c?'active':''} onClick={()=>applyTweak('accentColor',c)}
                style={{ '--ac':c }}>
                {l}
              </button>
            ))}
          </div>
        </div>

        <div className="tweak-row">
          <label className="tweak-label">DENSITY</label>
          <div className="tweak-toggle">
            {['compact','comfortable','spacious'].map(d=>(
              <button key={d} className={tweaks.density===d?'active':''} onClick={()=>applyTweak('density',d)}>
                {d.charAt(0).toUpperCase()+d.slice(1)}
              </button>
            ))}
          </div>
        </div>

        <div className="tweak-row">
          <label className="tweak-label">PULSE ANIMATION</label>
          <div className="tweak-toggle">
            <button className={tweaks.animatePulse?'active':''} onClick={()=>applyTweak('animatePulse',true)}>On</button>
            <button className={!tweaks.animatePulse?'active':''} onClick={()=>applyTweak('animatePulse',false)}>Off</button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
